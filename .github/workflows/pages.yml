name: Build site

on:
  push:
    branches:
    - "main"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:
    name: Build
    # TODO: Add check for source repository
    runs-on: ubuntu-22.04
    steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    #- name: Install uniget
    #  uses: uniget-org/uniget-action@2801de6989bb0c244342f750b29e6451498ba742 # v1.0.4
    #  with:
    #    prefix: helper
    #    tools: mkdocs

    - name: Install mkdocs
      run: |
        pip install \
            mkdocs \
            mkdocs-material \
            mkdocs-material-extensions \
            pymdown-extensions \
            mkdocs-minify-plugin \
            mkdocs-macros-plugin \
            mkdocs-redirects

    - name: Create site
      run: |
        #helper/usr/local/bin/mkdocs build
        mkdocs build

    - name: Upload artifact
      uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
      with:
        path: ./site

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs:
    - build
    runs-on: ubuntu-22.04
    steps:

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
